# ─────────────────────────────────────────────
# 🧱 BASIC APPEARANCE
# ─────────────────────────────────────────────
[colors.primary]
background = "#000000"
foreground = "#ffffff"

[colors.cursor]
text = "#000000"
cursor = "#00ffff"

[colors.selection]
background = "#333333"
text = "#ffffff"

# ─────────────────────────────────────────────
# 🔠 FONT SETTINGS
# ─────────────────────────────────────────────
[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

# Ghostty: bold-is-bright = true
[colors]
draw_bold_text_with_bright_colors = true

# ─────────────────────────────────────────────
# 🎨 ANSI COLORS (commented out in Ghostty)
# (included here, commented, for parity)
# ─────────────────────────────────────────────
# [colors.normal]
# black   = "#000000"
# red     = "#ff5f56"
# green   = "#5af78e"
# yellow  = "#f3f99d"
# blue    = "#57c7ff"
# magenta = "#ff6ac1"
# cyan    = "#9aedfe"
# white   = "#f1f1f0"

# [colors.bright]
# black   = "#686868"
# red     = "#ff5f56"
# green   = "#5af78e"
# yellow  = "#f3f99d"
# blue    = "#57c7ff"
# magenta = "#ff6ac1"
# cyan    = "#9aedfe"
# white   = "#ffffff"

# ─────────────────────────────────────────────
# 🪟 WINDOW & UI SETTINGS
# ─────────────────────────────────────────────
[window]
padding = { x = 1, y = 1 }
decorations = "full"
opacity = 1.0

[scrolling]
history = 10000

# ─────────────────────────────────────────────
# ⚡️ BEHAVIOR
# ─────────────────────────────────────────────
[selection]
save_to_clipboard = true

# ─────────────────────────────────────────────
# ⌨️ KEYBINDINGS (closest Alacritty equivalents)
# ─────────────────────────────────────────────
[[keyboard.bindings]]
key = "J"
mods = "Control|Shift"
action = "ScrollPageDown"

[[keyboard.bindings]]
key = "K"
mods = "Control|Shift"
action = "ScrollPageUp"














